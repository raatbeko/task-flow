name: Code Review Bot

on:
  push:
    branches-ignore:
      - 'gh-pages'

jobs:
  review:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'Merge pull request')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get diff
        id: diff
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
        run: |
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            git diff HEAD~1 HEAD > diff.txt || git show HEAD > diff.txt
          else
            git diff "$BEFORE" "$AFTER" > diff.txt
          fi

          # обрезаем большие диффы (~60k символов)
          head -c 60000 diff.txt > diff_trimmed.txt
          mv diff_trimmed.txt diff.txt

          if [ ! -s diff.txt ]; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Review with Gemini
        id: review
        if: steps.diff.outputs.empty == 'false'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # промпт пишем в файл через heredoc — никакого экранирования не нужно
          cat > prompt.txt << 'PROMPT_END'
          Ты senior Java/Spring-разработчик. Сделай код-ревью этого git diff.

          Проект: Spring Boot backend (Hibernate/JPA, PostgreSQL, REST).
          Отвечай кратко на русском, по делу, БЕЗ воды. Формат:

          ✅ Что сделано хорошо: (1-3 пункта, или пропусти если нечего)
          ⚠️ Что нужно исправить: (баги, ошибки логики, проблемы)
          🔒 Безопасность/производительность: (SQL-инъекции, N+1 запросы, отсутствие транзакций, невалидированные DTO, утечки ресурсов, HikariCP)
          💡 Совет: (1 короткий пункт, опционально)

          Если код в целом хороший — так и скажи, не выдумывай проблемы. Максимум ~200 слов.

          DIFF:
          PROMPT_END

          cat diff.txt >> prompt.txt

          # собираем JSON через jq — он сам всё экранирует
          jq -n --rawfile prompt prompt.txt '{
            contents: [{ parts: [{ text: $prompt }] }],
            generationConfig: { temperature: 0.3, maxOutputTokens: 800 }
          }' > request.json

          curl -s \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d @request.json > response.json

          jq -r '.candidates[0].content.parts[0].text // "⚠️ Не удалось получить ревью (проверь ключ/лимиты API)."' \
            response.json > review.txt

      - name: Send to Telegram
        if: steps.diff.outputs.empty == 'false'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BRANCH: ${{ github.ref_name }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          COMMIT_URL="https://github.com/${REPO}/commit/${SHA}"

          {
            echo "🤖 Code Review · ${REPO}"
            echo "Ветка: ${BRANCH}"
            echo "Автор: ${AUTHOR}"
            echo "Коммит: ${COMMIT_MSG} (${SHORT_SHA})"
            echo "${COMMIT_URL}"
            echo ""
            cat review.txt
          } > message.txt

          # лимит Telegram 4096 символов
          head -c 4000 message.txt > message_trimmed.txt

          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text@message_trimmed.txt" \
            --data-urlencode "disable_web_page_preview=true" \
            > /dev/null
